spring.thymeleaf.cache=true

# Behind an Nginx reverse proxy that terminates TLS: trust X-Forwarded-* headers
# so the app sees the real client IP and treats requests as HTTPS.
server.forward-headers-strategy=framework

# Session cookie hardening (HTTPS-only, not readable by JS, CSRF-resistant).
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# Bind all interfaces for container networking.
server.address=0.0.0.0
server.port=8080

app.admin.username=${ADMIN_USERNAME}
app.admin.password-hash=${ADMIN_PASSWORD_HASH}
app.admin.totp-secret=${ADMIN_TOTP_SECRET}