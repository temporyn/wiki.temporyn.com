<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/admin :: head('관리자 · Temporyn-Wiki')}"></head>
<body data-baseurl="">
  <header th:replace="~{fragments/admin :: header}"></header>

  <main class="admin">
    <div class="admin-head">
      <h1>Admin</h1>
      <span class="admin-user">로그인: <strong th:text="${username}">admin</strong></span>
    </div>

    <div class="admin-grid">
      <a class="admin-card" href="/admin/articles">
        <h2>문서 관리</h2>
        <span class="admin-card-meta" th:text="|문서 ${articleCount}개|">문서 0개</span>
      </a>
      <a class="admin-card" href="/admin/directories">
        <h2>디렉토리</h2>
        <span class="admin-card-meta" th:text="|디렉토리 ${directoryCount}개|">디렉토리 0개</span>
      </a>
    </div>
  </main>

  <script src="/assets/js/site.js" defer></script>
</body>
</html>
