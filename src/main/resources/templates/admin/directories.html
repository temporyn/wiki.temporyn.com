<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/admin :: head('디렉토리 · Temporyn-Wiki')}"></head>
<body data-baseurl="">
  <header th:replace="~{fragments/admin :: header}"></header>

  <main class="admin">
    <a class="admin-back" href="/admin">← Admin</a>
    <div class="admin-toolbar">
      <h1>디렉토리</h1>
      <a class="btn-primary" href="/admin/directories/new">새 디렉토리</a>
    </div>

    <p th:if="${error}" class="admin-error" th:text="${error}">오류</p>

    <div class="admin-table-wrap">
      <table class="admin-table">
        <thead>
          <tr>
            <th class="col-id">ID</th>
            <th class="col-path">경로</th>
            <th>이름</th>
            <th class="col-count">문서 수</th>
            <th class="col-actions">관리</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="dir : ${directories}">
            <td class="col-id" th:text="${dir.id}">1</td>
            <td class="col-path" th:text="${dir.path}">temp</td>
            <td th:text="${dir.name}">temp</td>
            <td class="col-count" th:text="${dir.articleCount}">0</td>
            <td class="col-actions admin-actions">
              <a th:href="@{|/admin/directories/${dir.id}/edit|}">이름변경</a>
              <form th:action="@{|/admin/directories/${dir.id}/delete|}" method="post"
                    style="display:inline" onsubmit="return confirm('이 디렉토리를 삭제할까요?');">
                <button type="submit">삭제</button>
              </form>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(directories)}">
            <td colspan="5" class="admin-empty">등록된 디렉토리가 없습니다.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="/assets/js/site.js" defer></script>
</body>
</html>
