<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/admin :: head(${mode == 'edit'} ? '디렉토리 편집 · Temporyn-Wiki' : '새 디렉토리 · Temporyn-Wiki')}"></head>
<body data-baseurl="">
  <header th:replace="~{fragments/admin :: header}"></header>

  <main class="admin">
    <a class="admin-back" href="/admin/directories">← 디렉토리</a>
    <div class="admin-toolbar">
      <h1 th:text="${mode == 'edit'} ? '디렉토리 편집' : '새 디렉토리'">새 디렉토리</h1>
    </div>

    <form class="admin-form" method="post"
          th:action="${mode == 'edit'} ? @{|/admin/directories/${directoryId}|} : @{/admin/directories}"
          th:object="${form}">
      <label for="name">이름</label>
      <input type="text" id="name" th:field="*{name}" autocomplete="off" required>

      <label for="parentId">상위 디렉토리</label>
      <select id="parentId" th:field="*{parentId}">
        <option value="">(최상위)</option>
        <option th:each="dir : ${directories}"
                th:if="${mode != 'edit'} or ${dir.id != directoryId}"
                th:value="${dir.id}" th:text="${dir.path}">temp</option>
      </select>

      <div class="admin-form-actions">
        <button type="submit" class="btn-primary">저장</button>
        <a class="btn-secondary" href="/admin/directories">취소</a>
      </div>
    </form>
  </main>

  <script src="/assets/js/site.js" defer></script>
</body>
</html>
